<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%"><style type="text/css">text { fill: gray; font-family: Avenir, Arial, Helvetica, sans-serif; }</style><defs><pattern id="twit" patternUnits="userSpaceOnUse" width="85" height="40"><text y="20" font-size="15" id="name">@logotypes</text></pattern><pattern xlink:href="#twit"><text y="40" x="0" font-size="11" id="copy">DO NOT COPY</text></pattern><pattern id="combo" xlink:href="#twit" patternTransform="rotate(-45)"><use xlink:href="#name" /><use xlink:href="#copy" /></pattern></defs><rect width="100%" height="100%" fill="url(#combo)" /></svg>